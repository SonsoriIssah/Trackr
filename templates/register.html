<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Trackr</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0e0c08;
      --bg-warm:      #121008;
      --card:         #1a1609;
      --border:       #2a2415;
      --border-mid:   #362e1c;
      --text:   #f0e8d5;
      --text-2: #b8a98a;
      --text-3: #7d7060;
      --text-4: #4a4232;
      --terra:      #df7a50;
      --terra-lt:   #e8977a;
      --terra-dim:  rgba(223,122,80,.13);
      --terra-glow: rgba(223,122,80,.22);
      --rose:     #cc6b6b;
      --rose-dim: rgba(204,107,107,.12);
      --sage:     #78c4a0;
      --sage-dim: rgba(120,196,160,.12);
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(14px); }
      to   { opacity:1; transform: translateY(0); }
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(ellipse 700px 500px at -8% -5%,  rgba(223,122,80,.09) 0%, transparent 60%),
        radial-gradient(ellipse 500px 700px at 108% 25%, rgba(120,196,160,.05) 0%, transparent 55%),
        radial-gradient(ellipse 600px 350px at 55% 110%, rgba(201,160,72,.04) 0%, transparent 50%);
      background-attachment: fixed;
    }

    .wrapper {
      width: 100%;
      max-width: 440px;
      animation: fadeUp .4s ease both;
    }

    .brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 48px;
      letter-spacing: -2px;
      color: var(--text);
      display: inline-block;
    }

    .logo::after {
      content: '';
      display: block;
      height: 3px;
      width: 40px;
      background: var(--terra);
      border-radius: 2px;
      margin: 6px auto 0;
      box-shadow: 0 0 12px var(--terra-glow);
    }

    .brand-sub { font-size: 13px; color: var(--text-3); margin-top: 10px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -.5px;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card-sub { font-size: 13px; color: var(--text-3); margin-bottom: 28px; }

    /* error */
    .error-box {
      display: flex;
      align-items: center;
      gap: 9px;
      background: var(--rose-dim);
      border: 1px solid rgba(204,107,107,.25);
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 13px;
      color: var(--rose);
      margin-bottom: 22px;
    }

    .error-box svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

    /* fields */
    .field { margin-bottom: 16px; }

    .field-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 7px;
    }

    .field-hint { font-size: 11px; color: var(--text-4); font-weight: 400; }

    .field input {
      width: 100%;
      background: var(--bg-warm);
      border: 1px solid var(--border-mid);
      border-radius: 8px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      padding: 12px 14px;
      outline: none;
      transition: border-color .18s, box-shadow .18s;
    }

    .field input::placeholder { color: var(--text-4); }
    .field input:focus { border-color: var(--terra); box-shadow: 0 0 0 3px var(--terra-dim); }

    /* divider */
    .field-divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    /* password strength */
    .strength-bar {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }

    .strength-seg {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      transition: background .2s;
    }

    .strength-label { font-size: 11px; color: var(--text-4); margin-top: 5px; }

    /* submit */
    .submit-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--terra);
      color: #1a0e06;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 14px;
      padding: 13px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all .2s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 2px 0 rgba(0,0,0,.3);
      margin-top: 8px;
    }

    .submit-btn:hover { background: var(--terra-lt); transform: translateY(-1px); box-shadow: 0 4px 16px var(--terra-glow); }
    .submit-btn:active { transform: translateY(0); }

    .card-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-3);
    }

    .card-footer a { color: var(--terra-lt); text-decoration: none; font-weight: 600; }
    .card-footer a:hover { text-decoration: underline; }

    /* terms note */
    .terms-note {
      font-size: 11px;
      color: var(--text-4);
      text-align: center;
      margin-top: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="brand">
      <div class="logo">Trackr</div>
      <p class="brand-sub">Your personal task tracker</p>
    </div>

    <div class="card">
      <h1 class="card-title">Create your account</h1>
      <p class="card-sub">Your tasks are private and only visible to you.</p>

      {% if error %}
      <div class="error-box">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/register">
        <div class="field">
          <label class="field-label" for="username">
            Username
            <span class="field-hint">3–20 chars</span>
          </label>
          <input type="text" id="username" name="username"
                 placeholder="pick a username"
                 value="{{ request.form.get('username', '') }}"
                 minlength="3" maxlength="20" required autofocus>
        </div>

        <div class="field">
          <label class="field-label" for="email">Email</label>
          <input type="email" id="email" name="email"
                 placeholder="you@example.com"
                 value="{{ request.form.get('email', '') }}"
                 required>
        </div>

        <div class="field-divider"></div>

        <div class="field">
          <label class="field-label" for="password">
            Password
            <span class="field-hint">min 6 chars</span>
          </label>
          <input type="password" id="password" name="password"
                 placeholder="••••••••" minlength="6" required
                 oninput="updateStrength(this.value)">
          <div class="strength-bar">
            <div class="strength-seg" id="s1"></div>
            <div class="strength-seg" id="s2"></div>
            <div class="strength-seg" id="s3"></div>
            <div class="strength-seg" id="s4"></div>
          </div>
          <div class="strength-label" id="strength-label"></div>
        </div>

        <div class="field">
          <label class="field-label" for="confirm">Confirm password</label>
          <input type="password" id="confirm" name="confirm"
                 placeholder="••••••••" required>
        </div>

        <button type="submit" class="submit-btn">Create account</button>
      </form>

      <p class="terms-note">Your data is stored locally and never shared.</p>
    </div>

    <div class="card-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>

  <script>
    const colors = {
      weak:   '#cc6b6b',
      fair:   '#c9a048',
      good:   '#78c4a0',
      strong: '#4db88c'
    };

    function updateStrength(val) {
      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const segs  = [s1, s2, s3, s4];
      const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
      const cols   = ['', colors.weak, colors.fair, colors.good, colors.strong];

      segs.forEach((s, i) => {
        s.style.background = i < score ? cols[score] : 'var(--border)';
      });

      document.getElementById('strength-label').textContent = val.length ? labels[score] : '';
      document.getElementById('strength-label').style.color = val.length ? cols[score] : '';
    }
  </script>
</body>
</html>
