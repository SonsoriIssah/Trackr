<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Trackr</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0e0c08;
      --bg-warm:      #121008;
      --card:         #1a1609;
      --card-hover:   #201c0e;
      --border:       #2a2415;
      --border-mid:   #362e1c;
      --border-strong:#473e28;
      --text:   #f0e8d5;
      --text-2: #b8a98a;
      --text-3: #7d7060;
      --text-4: #4a4232;
      --terra:      #df7a50;
      --terra-lt:   #e8977a;
      --terra-dim:  rgba(223,122,80,.13);
      --terra-glow: rgba(223,122,80,.22);
      --rose:     #cc6b6b;
      --rose-dim: rgba(204,107,107,.12);
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(14px); }
      to   { opacity:1; transform: translateY(0); }
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(ellipse 700px 500px at -8% -5%,  rgba(223,122,80,.09) 0%, transparent 60%),
        radial-gradient(ellipse 500px 700px at 108% 25%, rgba(120,196,160,.05) 0%, transparent 55%),
        radial-gradient(ellipse 600px 350px at 55% 110%, rgba(201,160,72,.04) 0%, transparent 50%);
      background-attachment: fixed;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
      animation: fadeUp .4s ease both;
    }

    /* ── BRAND ──────────────────────────────────────────── */
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 48px;
      letter-spacing: -2px;
      color: var(--text);
      display: inline-block;
      position: relative;
    }

    .logo::after {
      content: '';
      display: block;
      height: 3px;
      width: 40px;
      background: var(--terra);
      border-radius: 2px;
      margin: 6px auto 0;
      box-shadow: 0 0 12px var(--terra-glow);
    }

    .brand-sub {
      font-size: 13px;
      color: var(--text-3);
      margin-top: 10px;
    }

    /* ── CARD ───────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -.5px;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 13px;
      color: var(--text-3);
      margin-bottom: 28px;
    }

    /* ── ERROR ──────────────────────────────────────────── */
    .error-box {
      display: flex;
      align-items: center;
      gap: 9px;
      background: var(--rose-dim);
      border: 1px solid rgba(204,107,107,.25);
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 13px;
      color: var(--rose);
      margin-bottom: 22px;
    }

    .error-box svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

    /* ── FIELDS ─────────────────────────────────────────── */
    .field { margin-bottom: 18px; }

    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      background: var(--bg-warm);
      border: 1px solid var(--border-mid);
      border-radius: 8px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      padding: 12px 14px;
      outline: none;
      transition: border-color .18s, box-shadow .18s;
    }

    .field input::placeholder { color: var(--text-4); }
    .field input:focus { border-color: var(--terra); box-shadow: 0 0 0 3px var(--terra-dim); }

    /* ── SUBMIT ─────────────────────────────────────────── */
    .submit-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--terra);
      color: #1a0e06;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 14px;
      padding: 13px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all .2s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 2px 0 rgba(0,0,0,.3);
      margin-top: 8px;
    }

    .submit-btn:hover { background: var(--terra-lt); transform: translateY(-1px); box-shadow: 0 4px 16px var(--terra-glow); }
    .submit-btn:active { transform: translateY(0); }

    /* ── FOOTER LINK ────────────────────────────────────── */
    .card-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-3);
    }

    .card-footer a {
      color: var(--terra-lt);
      text-decoration: none;
      font-weight: 600;
    }

    .card-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="brand">
      <div class="logo">Trackr</div>
      <p class="brand-sub">Your personal task tracker</p>
    </div>

    <div class="card">
      <h1 class="card-title">Welcome back</h1>
      <p class="card-sub">Sign in to see your tasks.</p>

      {% if error %}
      <div class="error-box">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="field">
          <label class="field-label" for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="your_username"
                 value="{{ request.form.get('username', '') }}" required autofocus>
        </div>
        <div class="field">
          <label class="field-label" for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="submit-btn">Sign in</button>
      </form>
    </div>

    <div class="card-footer">
      Don't have an account? <a href="/register">Create one</a>
    </div>
  </div>
</body>
</html>
